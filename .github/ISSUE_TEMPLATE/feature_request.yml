name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that EasyClip makes hard today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Timeline editor
        - Trimming / cutting
        - Preview & playback
        - i18n & RTL
        - Processing engine
        - Packaging / install
        - Other
  - type: checkboxes
    id: lossless
    attributes:
      label: Design constraint
      options:
        - label: I understand EasyClip is lossless-only (stream-copy/concat, no re-encode) and targets non-technical users
          required: true
  - type: checkboxes
    id: searched
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
