name: Bug report
description: Report a problem with EasyClip
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security** issues, do not use this form —
        see our [Security Policy](https://github.com/lifebugz/easyclip/security/policy).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open file ...
        2. Drag the anchor to ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: ['macOS', 'Windows']
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: EasyClip version
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS version
  - type: dropdown
    id: language
    attributes:
      label: Language / layout
      options: ['English (LTR)', 'Hebrew (RTL)']
  - type: textarea
    id: media
    attributes:
      label: Media file details
      description: Container, codec, and duration (many bugs are codec-specific).
      placeholder: 'e.g. MP4, H.264 + AAC, 00:03:21'
  - type: input
    id: ffmpeg
    attributes:
      label: FFmpeg version
      value: '8.1 (bundled sidecar)'
  - type: textarea
    id: logs
    attributes:
      label: Logs / console output
      render: shell
  - type: checkboxes
    id: searched
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
