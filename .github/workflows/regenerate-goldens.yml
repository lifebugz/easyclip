name: Regenerate Layer 3 framehash goldens

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for regenerating (e.g., FFmpeg version bump from 8.1 → 8.2)'
        required: true

permissions:
  contents: read

jobs:
  regenerate:
    name: ${{ matrix.os }} • regenerate goldens
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev unzip

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with: { bun-version: latest }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Fetch FFmpeg sidecar
        run: bun run setup:ffmpeg

      - name: Regenerate goldens (Phase 7+ only — placeholder until then)
        shell: bash
        run: |
          if [ -f scripts/regenerate-goldens.ts ]; then
            bun run scripts/regenerate-goldens.ts
          else
            echo "regenerate-goldens.ts not yet present (Phase 7 introduces it). No-op."
          fi

      - name: Upload regenerated goldens as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: goldens-${{ matrix.os }}
          path: tests/fixtures/golden/
          if-no-files-found: ignore
